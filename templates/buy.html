{% extends "layout.html" %}

{% block title %}
    Buy
{% endblock %}

{% block main %}
    <h1 class="h3 mb-2">Buy</h1>
    <p class="text-muted mb-4">Search by symbol or company name. You have <strong>{{ cash | usd }}</strong> to invest.</p>

    <form action="/buy" method="POST" class="d-flex flex-column align-items-center">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto" style="width: 20rem;" name="symbol" id="buySymbol" placeholder="Symbol or company name" type="text" data-autocomplete value="{{ request.args.get('symbol', '') }}" required>
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="shares" id="buyShares" placeholder="Shares" type="number" min="1" value="1" required>
        </div>

        <div class="card shadow-sm mb-3 d-none text-start" id="estimator" style="width: 20rem;">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <span>Price (<span id="estSymbol"></span>)</span><strong id="estPrice"></strong>
                </div>
                <div class="d-flex justify-content-between">
                    <span>Estimated cost</span><strong id="estCost"></strong>
                </div>
                <div class="d-flex justify-content-between">
                    <span>Cash after purchase</span><strong id="estAfter"></strong>
                </div>
                <div class="progress mt-2" style="height: 8px;">
                    <div class="progress-bar" id="estBar" role="progressbar" style="width: 0%"></div>
                </div>
                <div class="small text-muted mt-1">You can afford up to <strong id="estMax"></strong> shares</div>
            </div>
        </div>

        <button class="btn btn-primary" type="submit" id="buySubmit">Buy</button>
    </form>
{% endblock %}

{% block scripts %}
<script src="/static/autocomplete.js"></script>
<script>
    const CASH = {{ cash | tojson }};
    const usd = v => "$" + v.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    const symbolInput = document.getElementById("buySymbol");
    const sharesInput = document.getElementById("buyShares");
    let price = null;
    let priceSymbol = null;

    async function fetchPrice(symbol) {
        price = null;
        try {
            const res = await fetch(`/api/price?symbol=${encodeURIComponent(symbol)}`);
            if (!res.ok) { render(); return; }
            const data = await res.json();
            price = data.price;
            priceSymbol = data.symbol;
        } catch (e) { /* leave estimator hidden */ }
        render();
    }

    function render() {
        const card = document.getElementById("estimator");
        if (price === null || priceSymbol !== symbolInput.value.trim().toUpperCase()) {
            card.classList.add("d-none");
            return;
        }
        const shares = Math.max(1, parseInt(sharesInput.value) || 1);
        const cost = price * shares;
        const pct = CASH > 0 ? Math.min(100, cost / CASH * 100) : 100;
        const over = cost > CASH;

        document.getElementById("estSymbol").textContent = priceSymbol;
        document.getElementById("estPrice").textContent = usd(price);
        document.getElementById("estCost").textContent = usd(cost);
        const after = document.getElementById("estAfter");
        after.textContent = usd(CASH - cost);
        after.classList.toggle("text-danger", over);
        const bar = document.getElementById("estBar");
        bar.style.width = pct + "%";
        bar.className = "progress-bar " + (over ? "bg-danger" : pct > 80 ? "bg-warning" : "bg-success");
        document.getElementById("estMax").textContent = Math.floor(CASH / price).toLocaleString();
        document.getElementById("buySubmit").disabled = over;
        card.classList.remove("d-none");
    }

    symbolInput.addEventListener("symbol-selected", e => fetchPrice(e.detail.symbol));
    symbolInput.addEventListener("change", () => {
        const s = symbolInput.value.trim().toUpperCase();
        if (s) fetchPrice(s);
    });
    sharesInput.addEventListener("input", render);

    if (symbolInput.value.trim()) fetchPrice(symbolInput.value.trim().toUpperCase());
</script>
{% endblock %}
